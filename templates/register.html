{% extends 'base.html' %}

{% block css %}

<style>

@import url("https://fonts.googleapis.com/css?family=Fira+Sans");

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fira Sans", sans-serif;
}

/* container */

.form-structor {
    background-image: url('https://vida.id/hubfs/Perbedaan%20Hacker%20dan%20Cracker.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    border-radius: 15px;
    height: 550px;
    width: 350px;
    position: relative;
    overflow: hidden;
}

/* SIGNUP */

.signup {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 65%;
    z-index: 5;
    transition: .3s;
}

.signup.slide-up {
    top: 85%;
}

.signup .form-title {
    color: rgb(10, 86, 52);
    font-size: 1.7em;
    text-align: center;
    cursor: pointer;
}

.signup .form-holder {
    border-radius: 15px;
    margin-top: 30px;
    overflow: hidden;
}

.input {
    border: none;
    width: 100%;
    padding: 12px;
    border-bottom: 1px solid #eee;
}

.submit-btn {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 15px;
    background: #444;
    color: white;
    cursor: pointer;
}

/* LOGIN */

.login {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80%;
    border-radius: 50% 50% 0 0;
    transition: .3s;
}

.login.slide-up {
    height: 20%;
}

.center {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65%;
}

.login .form-title {
    text-align: center;
    font-size: 1.7em;
    cursor: pointer;
    color: seagreen;
}

.login .form-holder {
    margin-top: 30px;
}

</style>

{% endblock %}

{% block content %}

<div class="form-structor" >
<form action="/login" method="POST">

    <div class="signup slide-up">
        <h2 class="form-title" id="signup">Sign up</h2>
        
        <div class="form-holder">
            <input type="text" class="input" placeholder="Name">
            <input type="email" class="input" placeholder="Email">
            <input type="password" class="input" placeholder="Password">
        </div>
        
        <button class="submit-btn">Sign up</button>
    </div>
</form>
    
<form action="/register" method="POST">
<div class="login">
        <div class="center">
            
            <h2 class="form-title" id="login">Log in</h2>
            
            <div class="form-holder">

                <input type="text" name="name" class="input" placeholder="Name">
                <input type="email" name="email" class="input" placeholder="Email">
                <input type="password" name="password" class="input" placeholder="Password">
                <input type="password" name="confirm_password" class="input" placeholder="Confirm Password">
            </div>

            <button class="submit-btn">Log in</button>

        </div>
    </div>

</form>
</div>

{% endblock %}

{% block js %}

<script>

const loginBtn = document.getElementById("login");
const signupBtn = document.getElementById("signup");

loginBtn.onclick = () => {
    document.querySelector(".login").classList.remove("slide-up");
    document.querySelector(".signup").classList.add("slide-up");
};

signupBtn.onclick = () => {
    document.querySelector(".signup").classList.remove("slide-up");
    document.querySelector(".login").classList.add("slide-up");
};

</script>
<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const numbers = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

for (let x = 0; x < columns; x++) {
    drops[x] = 1;
}

function draw() {

    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {

        const text = numbers.charAt(
            Math.floor(Math.random() * numbers.length)
        );

        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 80);   // slow falling speed

</script>

{% endblock %}
