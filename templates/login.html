{% extends 'base.html' %}

{% block css %}

<style>

@import url("https://fonts.googleapis.com/css?family=Fira+Sans");

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fira Sans", sans-serif;
}

/* container */

.form-structor {
    background-image: url('https://vida.id/hubfs/Perbedaan%20Hacker%20dan%20Cracker.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    border-radius: 15px;
    height: 550px;
    width: 350px;
    position: relative;
    overflow: hidden;
}

/* SIGNUP */

.signup {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 65%;
    z-index: 5;
    transition: .3s;
}

.signup.slide-up {
    top: 85%;
}

.signup .form-title {
    color: rgb(10, 86, 52);
    font-size: 1.7em;
    text-align: center;
    cursor: pointer;
}

.signup .form-holder {
    border-radius: 15px;
    margin-top: 30px;
    overflow: hidden;
}

.input {
    border: none;
    width: 100%;
    padding: 12px;
    border-bottom: 1px solid #eee;
}

.submit-btn {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 15px;
    background: #444;
    color: white;
    cursor: pointer;
}

/* LOGIN */

.login {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80%;
    border-radius: 50% 50% 0 0;
    transition: .3s;
}

.login.slide-up {
    height: 20%;
}

.center {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65%;
}

.login .form-title {
    text-align: center;
    font-size: 1.7em;
    cursor: pointer;
    color: seagreen;
}

.login .form-holder {
    margin-top: 30px;
}

</style>

{% endblock %}

{% block content %}

<div class="form-structor" >

    <div class="signup slide-up">
        <h2 class="form-title" id="signup">Sign up</h2>

        <div class="form-holder">
            <input type="text" class="input" placeholder="Name">
            <input type="email" class="input" placeholder="Email">
            <input type="password" class="input" placeholder="Password">
        </div>

        <button class="submit-btn">Sign up</button>
    </div>


    <div class="login">
        <div class="center">

            <h2 class="form-title" id="login">Log in</h2>

            <div class="form-holder">
                <input type="email" class="input" placeholder="Email">
                <input type="password" class="input" placeholder="Password">
            </div>

            <button class="submit-btn">Log in</button>

        </div>
    </div>

</div>

{% endblock %}

{% block js %}

<script>

const loginBtn = document.getElementById("login");
const signupBtn = document.getElementById("signup");

loginBtn.onclick = () => {
    document.querySelector(".login").classList.remove("slide-up");
    document.querySelector(".signup").classList.add("slide-up");
};

signupBtn.onclick = () => {
    document.querySelector(".signup").classList.remove("slide-up");
    document.querySelector(".login").classList.add("slide-up");
};

</script>

{% endblock %}
