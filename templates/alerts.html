<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #0b1220, #111827);
      color: #e5eefb;
      min-height: 100vh;
    }
    nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(11, 18, 32, 0.92);
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
    }
    .brand { font-weight: 700; letter-spacing: 0.08em; color: #7dd3fc; }
    .links { display: flex; gap: 10px; margin-left: 12px; flex-wrap: wrap; }
    .links a {
      color: #94a3b8;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 999px;
    }
    .links a.active, .links a:hover { background: rgba(125, 211, 252, 0.14); color: #e5eefb; }
    .live {
      margin-left: auto;
      font-size: 12px;
      color: #86efac;
      border: 1px solid rgba(134, 239, 172, 0.25);
      padding: 6px 10px;
      border-radius: 999px;
    }
    .logout-link {
      color: #fca5a5;
      text-decoration: none;
      font-size: 12px;
      border: 1px solid rgba(248, 113, 113, 0.28);
      background: rgba(127, 29, 29, 0.22);
      padding: 6px 12px;
      border-radius: 999px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .logout-link:hover {
      background: rgba(127, 29, 29, 0.34);
      border-color: rgba(248, 113, 113, 0.4);
      color: #fecaca;
    }
    .page { max-width: 1180px; margin: 0 auto; padding: 28px 24px 40px; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    h1 { font-size: 32px; margin-bottom: 6px; }
    .subtitle { color: #94a3b8; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button, select, input {
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.72);
      color: #e5eefb;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
    }
    button { cursor: pointer; }
    button.primary { background: #0284c7; border-color: #0284c7; }
    button.danger { background: rgba(127, 29, 29, 0.3); border-color: rgba(248, 113, 113, 0.35); color: #fca5a5; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .metric, .panel, .alert-card {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(2, 8, 23, 0.3);
    }
    .metric { padding: 18px; }
    .metric-label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
    .metric-value { font-size: 30px; font-weight: 700; margin-top: 8px; }
    .controls {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }
    .feed { display: grid; gap: 14px; }
    .alert-card { padding: 18px; }
    .alert-top, .alert-bottom {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .alert-top { margin-bottom: 10px; }
    .alert-title { font-size: 18px; font-weight: 600; }
    .alert-desc { color: #cbd5e1; line-height: 1.5; margin-bottom: 14px; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; color: #94a3b8; font-size: 13px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .sev-Critical { background: rgba(127, 29, 29, 0.35); color: #fca5a5; }
    .sev-High { background: rgba(120, 53, 15, 0.35); color: #fdba74; }
    .sev-Medium { background: rgba(113, 63, 18, 0.35); color: #fde68a; }
    .sev-Low { background: rgba(20, 83, 45, 0.35); color: #86efac; }
    .type { background: rgba(30, 41, 59, 0.85); color: #bfdbfe; }
    .alert-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .empty, .error {
      padding: 28px;
      text-align: center;
      color: #94a3b8;
    }
    .error { color: #fca5a5; }
    @media (max-width: 860px) {
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="brand">HONEYPOT</div>
    <div class="links">
      <a href="/dashboard">Dashboard</a>
      <a href="/attacklogs">Attack Logs</a>
      <a href="/IPmonitor">IP Monitor</a>
      <a href="/analysis">Analysis</a>
      <a href="/alerts" class="active">Alerts</a>
    </div>
    <div class="live">Live alerts</div>
    <a href="/logout" class="logout-link">Logout</a>
  </nav>

  <div class="page">
    <div class="header">
      <div>
        <h1>Alerts</h1>
        <div class="subtitle">Live alert feed generated from captured honeypot traffic.</div>
      </div>
      <div class="actions">
        <button onclick="markAllRead()">Mark all read</button>
        <button class="danger" onclick="clearAll()">Clear all</button>
      </div>
    </div>

    <div class="metrics" id="metrics"></div>

    <div class="controls">
      <input id="search" placeholder="Search IP, path, title..." oninput="render()">
      <select id="severity" onchange="render()">
        <option value="">All severities</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select id="state" onchange="render()">
        <option value="">All alerts</option>
        <option value="unread">Unread</option>
        <option value="read">Read</option>
      </select>
      <select id="type" onchange="render()">
        <option value="">All attack types</option>
      </select>
    </div>

    <div class="feed" id="feed">
      <div class="empty">Loading alerts...</div>
    </div>
  </div>

  <script>
    let ALERTS = [];
    let SUMMARY = { total: 0, unread: 0, critical: 0, high: 0, medium: 0, low: 0 };

    function badgeClass(sev) {
      return `sev-${sev}`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function getFiltered() {
      const search = document.getElementById("search").value.toLowerCase();
      const severity = document.getElementById("severity").value;
      const state = document.getElementById("state").value;
      const type = document.getElementById("type").value;

      return ALERTS.filter((alert) => {
        const haystack = `${alert.title} ${alert.desc} ${alert.ip} ${alert.target} ${alert.type}`.toLowerCase();
        if (search && !haystack.includes(search)) return false;
        if (severity && alert.sev !== severity) return false;
        if (state === "unread" && alert.read) return false;
        if (state === "read" && !alert.read) return false;
        if (type && alert.type !== type) return false;
        return true;
      });
    }

    function drawMetrics() {
      document.getElementById("metrics").innerHTML = `
        <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${SUMMARY.total}</div></div>
        <div class="metric"><div class="metric-label">Unread</div><div class="metric-value">${SUMMARY.unread}</div></div>
        <div class="metric"><div class="metric-label">Critical</div><div class="metric-value">${SUMMARY.critical}</div></div>
        <div class="metric"><div class="metric-label">High</div><div class="metric-value">${SUMMARY.high}</div></div>
        <div class="metric"><div class="metric-label">Medium</div><div class="metric-value">${SUMMARY.medium}</div></div>
        <div class="metric"><div class="metric-label">Low</div><div class="metric-value">${SUMMARY.low}</div></div>
      `;
    }

    function drawTypeOptions() {
      const typeSelect = document.getElementById("type");
      const current = typeSelect.value;
      const types = [...new Set(ALERTS.map((alert) => alert.type))];
      typeSelect.innerHTML = `<option value="">All attack types</option>` +
        types.map((type) => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join("");
      typeSelect.value = types.includes(current) ? current : "";
    }

    function render() {
      drawMetrics();
      const feed = document.getElementById("feed");
      const alerts = getFiltered();

      if (!alerts.length) {
        feed.innerHTML = `<div class="panel empty">No alerts match the current filters.</div>`;
        return;
      }

      feed.innerHTML = alerts.map((alert) => `
        <article class="alert-card">
          <div class="alert-top">
            <div>
              <div class="alert-title">${escapeHtml(alert.title)}</div>
              <div class="meta">
                <span>${escapeHtml(alert.timestamp.replace("T", " ").slice(0, 19))}</span>
                <span>${escapeHtml(alert.ip)}</span>
                <span>${escapeHtml(alert.target)}</span>
              </div>
            </div>
            <div class="meta">
              <span class="badge ${badgeClass(alert.sev)}">${escapeHtml(alert.sev)}</span>
              <span class="badge type">${escapeHtml(alert.type)}</span>
              ${alert.read ? `<span class="badge type">Read</span>` : `<span class="badge sev-High">Unread</span>`}
            </div>
          </div>
          <div class="alert-desc">${escapeHtml(alert.desc)}</div>
          <div class="alert-bottom">
            <div class="meta">
              <span>Method: ${escapeHtml(alert.details.method)}</span>
              <span>Action: ${escapeHtml(alert.action)}</span>
              <span>Payload: ${escapeHtml(alert.details.payload)}</span>
            </div>
            <div class="alert-actions">
              ${alert.read ? "" : `<button onclick="markRead(${alert.id})">Mark read</button>`}
              <button onclick="goToLogs('${escapeHtml(alert.ip)}')">View logs</button>
              <button class="danger" onclick="dismiss(${alert.id})">Dismiss</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    async function loadAlerts() {
      try {
        const response = await fetch("/api/alerts");
        const data = await response.json();
        ALERTS = Array.isArray(data.alerts) ? data.alerts : [];
        SUMMARY = data.summary || SUMMARY;
        drawTypeOptions();
        render();
      } catch (error) {
        document.getElementById("feed").innerHTML = `<div class="panel error">Unable to load alerts from the backend.</div>`;
      }
    }

    async function markRead(id) {
      await fetch(`/api/alerts/${id}/read`, { method: "POST" });
      await loadAlerts();
    }

    async function markAllRead() {
      await fetch("/api/alerts/mark-all-read", { method: "POST" });
      await loadAlerts();
    }

    async function dismiss(id) {
      await fetch(`/api/alerts/${id}`, { method: "DELETE" });
      await loadAlerts();
    }

    async function clearAll() {
      await fetch("/api/alerts/clear", { method: "DELETE" });
      await loadAlerts();
    }

    function goToLogs(ip) {
      window.location.href = `/attacklogs?ip=${encodeURIComponent(ip)}`;
    }

    loadAlerts();
    setInterval(loadAlerts, 10000);
  </script>
</body>
</html>
